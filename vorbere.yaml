version: 1

vars:
  PROJECT_NAME: runtimescaner
  LINUX_AMD64_TARGET: "x86_64-unknown-linux-musl"
  LINUX_ARM64_TARGET: "aarch64-unknown-linux-musl"

tasks:
  build:
    run: cargo build
    desc: Build debug artifacts

  run:
    run: RUST_LOG=debug cargo run
    desc: Run the RuntimeScaner binary

  fmt:
    run: cargo fmt --all
    desc: Format Rust code

  fmt-check:
    run: cargo fmt --all -- --check
    desc: Check Rust formatting

  clippy:
    run: cargo clippy --all-targets -- -D warnings
    desc: Run clippy with warnings denied

  check:
    depends_on: [fmt-check, clippy]
    desc: Run all lint checks

  test:
    depends_on: [check, build]
    run: cargo test --all
    desc: Run test suite
# cargo install cargo-audit
  vulnerability:
    run: cargo audit
    desc: Scan dependencies for known vulnerabilities

  clean:
    run: cargo clean
    desc: Clean build artifacts

  release-build:
    depends_on: [linux-amd64, linux-arm64]
    desc: Build release binaries for Linux amd64 and arm64

  linux-amd64:
    run: cargo build --release --target ${{ .vars.LINUX_AMD64_TARGET }}
    desc: Build release binary for Linux amd64

  linux-arm64:
    run: cargo build --release --target ${{ .vars.LINUX_ARM64_TARGET }}
    desc: Build release binary for Linux arm64

  linux-amd64-archive:
    depends_on: [linux-amd64]
    run: |
      tar --gzip --create --directory=target/${{ .vars.LINUX_AMD64_TARGET }}/release --file=./${{ .vars.PROJECT_NAME }}_linux-amd64.tar.gz ${{ .vars.PROJECT_NAME }}
    desc: Archive release binary for Linux amd64

  linux-arm64-archive:
    depends_on: [linux-arm64]
    run: |
      tar --gzip --create --directory=target/${{ .vars.LINUX_ARM64_TARGET }}/release --file=./${{ .vars.PROJECT_NAME }}_linux-arm64.tar.gz ${{ .vars.PROJECT_NAME }}
    desc: Archive release binary for Linux arm64

  release-archives:
    depends_on: [linux-amd64-archive, linux-arm64-archive]
    desc: Archive release binaries for Linux amd64 and arm64

  release:
    depends_on: [release-archives]
    desc: Build and archive release artifacts

  ci:
    depends_on: [check, test, build]
    desc: Run CI-equivalent checks
