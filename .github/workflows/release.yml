# This workflow builds and releases the tool on manual dispatch.
# It reads the package version from Cargo.toml and creates the vX.Y.Z tag after
# validation and artifact creation succeed.

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure main branch
        shell: bash
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Releases must run from main. Current ref: ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Resolve version
        id: version
        shell: bash
        run: |
          RAW_VERSION="$(sed -nE "s/^version = \"(.*)\"/\1/p" Cargo.toml | head -n 1)"
          if [ -z "$RAW_VERSION" ]; then
            echo "failed to resolve version from Cargo.toml" >&2
            exit 1
          fi

          TAG="v${RAW_VERSION#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Verify release tag is available
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag already exists on origin: $TAG" >&2
            exit 1
          fi

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pirakansa/vorbere@v0
        with:
          version: v0.3.1

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-unknown-linux-gnu, x86_64-unknown-linux-gnu

      - name: Install cross-compiler
        run: sudo apt-get update && sudo apt-get install --yes gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: vorbere run test

      - name: Build release binaries
        run: vorbere run release-build

      - name: Create release archives
        run: vorbere run release-archives

      - name: Upload Linux release archives
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            runtimescaner_linux-amd64.tar.gz
            runtimescaner_linux-arm64.tar.gz
          if-no-files-found: error

  publish:
    needs: [prepare, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create and push release tag
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: dist/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}